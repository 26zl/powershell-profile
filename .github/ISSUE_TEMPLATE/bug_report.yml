name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["bug"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checklist
      options:
        - label: I have run `Update-Profile` and the issue persists
        - label: I have run `Clear-ProfileCache` and the issue persists
        - label: I have searched existing issues for duplicates
          required: true

  - type: dropdown
    id: ps-version
    attributes:
      label: PowerShell version
      options:
        - PowerShell 5.1
        - PowerShell 7+
        - Both
    validations:
      required: true

  - type: input
    id: windows-version
    attributes:
      label: Windows version
      description: "Run `[System.Environment]::OSVersion.Version` or `winver`"
      placeholder: "e.g. Windows 11 24H2 (26200)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error output
      description: Paste any error messages or relevant terminal output
      render: powershell
